<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Master: Curso Interactivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        editor: { bg: '#1e1e1e', fg: '#d4d4d4' },
                        brand: { 500: '#3b82f6', 600: '#2563eb' },
                        success: { 500: '#22c55e', 600: '#16a34a' }
                    },
                    fontFamily: {
                        mono: ['"Fira Code"', 'monospace'],
                        sans: ['"Inter"', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; }
        textarea { font-family: 'Fira Code', monospace; tab-size: 2; }
        
        /* Scrollbars */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        
        @media (max-width: 1024px) {
            .mobile-panel { display: none; }
            .mobile-panel.active { display: flex; }
        }

        @keyframes bounce-sm {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-2px); }
        }
        .animate-bounce-sm { animation: bounce-sm 1s infinite; }
        
        /* Modal Overlay */
        .modal-overlay { background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); }

        /* Sidebar Transition */
        #sidebar { transition: width 0.3s ease, transform 0.3s ease; }
    </style>
</head>
<body class="h-screen flex flex-col lg:flex-row bg-slate-950 text-slate-300">

    <!-- MODAL DE CARGA -->
    <div id="loader-modal" class="fixed inset-0 z-50 modal-overlay flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-700 rounded-xl shadow-2xl max-w-md w-full p-6 text-center text-slate-200">
            <div id="loader-spinner">
                <i data-lucide="loader-2" class="w-12 h-12 text-blue-500 animate-spin mx-auto mb-4"></i>
                <h2 class="text-xl font-bold mb-2">Cargando Curso...</h2>
                <p class="text-slate-400 text-sm">Buscando course.json</p>
            </div>
            
            <div id="loader-error" class="hidden">
                <div class="bg-red-900/20 text-red-500 w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-4 border border-red-900/50">
                    <i data-lucide="cloud-off" class="w-6 h-6"></i>
                </div>
                <h2 class="text-xl font-bold mb-2">No se encontró el curso</h2>
                <p class="text-slate-400 text-sm mb-4">Sube el archivo <code>course.json</code> a GitHub y pega aquí la URL (Raw).</p>
                <form onsubmit="handleManualUrl(event)" class="space-y-3">
                    <input type="url" id="course-url-input" placeholder="https://raw.githubusercontent.com/.../course.json" class="w-full bg-slate-800 border border-slate-600 rounded px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none text-white" required>
                    <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded font-semibold hover:bg-blue-700 transition">Cargar Curso</button>
                </form>
            </div>
        </div>
    </div>

    <!-- SIDEBAR (Navegación) -->
    <aside class="w-full lg:w-72 bg-slate-900 text-slate-300 flex flex-col flex-shrink-0 z-20 shadow-xl lg:h-full lg:relative absolute top-14 left-0 h-[calc(100vh-60px)] -translate-x-full lg:translate-x-0 overflow-hidden border-r border-slate-800" id="sidebar">
        <div class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-950 h-14 min-h-[3.5rem]">
            <div class="flex items-center gap-2 text-white font-bold whitespace-nowrap overflow-hidden">
                <div class="bg-blue-600 p-1.5 rounded flex-shrink-0">
                    <i data-lucide="code-2" class="w-5 h-5"></i>
                </div>
                <span>HTML Master</span>
            </div>
            <button onclick="toggleSidebar()" class="lg:hidden text-slate-400 hover:text-white">
                <i data-lucide="x"></i>
            </button>
        </div>

        <div id="lesson-list" class="flex-1 overflow-y-auto p-2 space-y-1">
            <!-- JS Renders List Here -->
        </div>

        <div class="p-4 bg-slate-950 border-t border-slate-800 whitespace-nowrap overflow-hidden">
            <div class="flex justify-between text-xs mb-1">
                <span>Progreso</span>
                <span id="progress-text">0%</span>
            </div>
            <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                <div id="progress-bar" class="bg-blue-500 h-full w-0 transition-all duration-500"></div>
            </div>
        </div>
    </aside>

    <!-- WORKSPACE -->
    <main class="flex-1 flex flex-col lg:flex-row h-full relative overflow-hidden">
        
        <!-- PANEL 1: GUÍA (MODO OSCURO) -->
        <section id="panel-guide" class="mobile-panel active lg:flex w-full lg:w-1/3 flex-col border-r border-slate-700 bg-slate-900">
            <header class="h-14 border-b border-slate-800 flex items-center px-4 justify-between bg-slate-950 shrink-0">
                <div class="flex items-center gap-3">
                    <button onclick="toggleSidebar()" class="text-slate-400 hover:text-blue-500 transition p-1 hover:bg-slate-800 rounded">
                        <i data-lucide="panel-left" class="w-5 h-5"></i>
                    </button>
                    <h2 class="font-semibold text-slate-200 flex items-center gap-2 text-sm sm:text-base">
                        <i data-lucide="book-open" class="w-4 h-4 text-blue-500"></i> Lección
                    </h2>
                </div>
                
                <div class="flex gap-2">
                    <button onclick="prevLesson()" class="p-1.5 hover:bg-slate-800 rounded text-slate-400 disabled:opacity-30 transition" id="btn-prev" title="Anterior">
                        <i data-lucide="chevron-left" class="w-4 h-4"></i>
                    </button>
                    <button onclick="checkAndNext()" id="btn-next" class="px-3 py-1.5 bg-slate-800 text-slate-400 rounded text-xs font-bold flex items-center gap-1 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                        <span>Siguiente</span>
                        <i data-lucide="chevron-right" class="w-3 h-3"></i>
                    </button>
                </div>
            </header>
            
            <div class="flex-1 overflow-y-auto relative">
                <!-- prose-invert añadido para texto claro -->
                <div id="guide-content" class="p-6 prose prose-invert prose-sm max-w-none pb-24 text-slate-300">
                    <!-- Contenido inyectado -->
                </div>
                
                <!-- Feedback Flotante (Adaptado a Dark Mode) -->
                <div id="feedback-area" class="absolute bottom-0 left-0 right-0 p-4 bg-slate-900/95 backdrop-blur border-t border-slate-700 transform translate-y-full transition-transform duration-300 z-10 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.3)]">
                    <div class="flex items-start gap-3">
                        <div id="feedback-icon" class="p-2 rounded-full flex-shrink-0"></div>
                        <div class="flex-1">
                            <h4 id="feedback-title" class="font-bold text-sm"></h4>
                            <p id="feedback-msg" class="text-xs mt-1"></p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- PANEL 2: EDITOR (YA ERA OSCURO) -->
        <section id="panel-editor" class="mobile-panel lg:flex w-full lg:w-1/3 flex-col border-r border-slate-700 bg-[#1e1e1e]">
            <header class="h-14 border-b border-white/10 flex items-center px-4 justify-between bg-[#1e1e1e] text-slate-400 shrink-0">
                <span class="text-xs font-mono flex items-center gap-2">
                    <i data-lucide="file-code" class="w-4 h-4 text-yellow-500"></i> index.html
                </span>
                <div class="flex gap-2">
                     <button onclick="checkCode()" class="text-xs bg-blue-600 hover:bg-blue-500 text-white px-3 py-1 rounded flex items-center gap-1 transition">
                        <i data-lucide="play" class="w-3 h-3"></i> Verificar
                    </button>
                    <button onclick="resetCode()" class="text-xs hover:text-white p-1 rounded hover:bg-white/10" title="Reiniciar código">
                        <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
                    </button>
                </div>
            </header>
            <div class="flex-1 relative flex">
                <div class="hidden sm:block w-10 bg-[#1e1e1e] border-r border-white/5 text-slate-600 text-xs font-mono text-right py-4 pr-2 select-none leading-relaxed opacity-50">
                    1<br>2<br>3<br>4<br>5<br>6<br>7<br>8<br>9<br>10<br>11<br>12<br>13<br>14<br>15
                </div>
                <textarea 
                    id="code-editor" 
                    class="flex-1 bg-[#1e1e1e] text-slate-300 p-4 font-mono text-sm border-none resize-none focus:outline-none focus:ring-0 leading-relaxed" 
                    spellcheck="false"
                    placeholder="Cargando..."
                ></textarea>
            </div>
        </section>

        <!-- PANEL 3: PREVIEW (MODO CLARO) -->
        <section id="panel-preview" class="mobile-panel lg:flex w-full lg:w-1/3 flex-col bg-slate-100">
            <header class="h-14 border-b border-slate-200 flex items-center px-4 justify-between bg-white shrink-0">
                <span class="text-xs font-semibold text-slate-500 uppercase tracking-wider flex items-center gap-2">
                    <i data-lucide="monitor" class="w-4 h-4 text-green-500"></i> Resultado
                </span>
            </header>
            <div class="flex-1 p-4 flex flex-col h-full overflow-hidden">
                <div class="bg-white flex-1 rounded shadow-sm overflow-hidden border border-slate-200 relative">
                    <iframe id="preview-frame" class="w-full h-full border-none"></iframe>
                    <div class="pointer-events-none absolute inset-0"></div>
                </div>
            </div>
        </section>
    </main>

    <!-- MOBILE TABS -->
    <nav class="lg:hidden h-[60px] bg-slate-900 border-t border-slate-800 flex justify-around items-center z-30 shrink-0">
        <button onclick="switchTab('guide')" class="tab-btn active text-slate-400 hover:text-blue-500 flex flex-col items-center gap-1 p-2 w-1/3" data-target="guide">
            <i data-lucide="book-open" class="w-5 h-5"></i>
        </button>
        <button onclick="switchTab('editor')" class="tab-btn text-slate-400 hover:text-blue-500 flex flex-col items-center gap-1 p-2 w-1/3" data-target="editor">
            <i data-lucide="code" class="w-5 h-5"></i>
        </button>
        <button onclick="switchTab('preview')" class="tab-btn text-slate-400 hover:text-blue-500 flex flex-col items-center gap-1 p-2 w-1/3" data-target="preview">
            <i data-lucide="eye" class="w-5 h-5"></i>
        </button>
    </nav>

    <script>
        const DEFAULT_COURSE_URL = 'course.json';
        let lessons = [];
        let currentLessonIndex = 0;
        let isCodeValid = false;
        let isDesktopSidebarOpen = true;
        let isFirstLoad = true; // Flag para controlar comportamiento inicial
        
        // Elementos DOM
        const editor = document.getElementById('code-editor');
        const preview = document.getElementById('preview-frame');
        const guideContent = document.getElementById('guide-content');
        const lessonList = document.getElementById('lesson-list');
        const feedbackArea = document.getElementById('feedback-area');
        const btnNext = document.getElementById('btn-next');
        const loaderModal = document.getElementById('loader-modal');
        const loaderSpinner = document.getElementById('loader-spinner');
        const loaderError = document.getElementById('loader-error');
        const sidebar = document.getElementById('sidebar');

        // --- INICIO ---
        async function init() {
            lucide.createIcons();
            const savedUrl = localStorage.getItem('course_url');
            const urlToFetch = savedUrl || DEFAULT_COURSE_URL;
            await fetchCourse(urlToFetch);

            editor.addEventListener('input', () => {
                updatePreview();
                validateCode();
                if(lessons.length > 0) {
                    localStorage.setItem(`htmlmaster_l${lessons[currentLessonIndex].id}`, editor.value);
                }
            });
        }

        async function fetchCourse(url) {
            try {
                loaderSpinner.classList.remove('hidden');
                loaderError.classList.add('hidden');
                loaderModal.classList.remove('hidden');

                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                lessons = await response.json();
                
                if (!Array.isArray(lessons) || lessons.length === 0) throw new Error("JSON inválido");

                loaderModal.classList.add('hidden');
                localStorage.setItem('course_url', url);
                renderLessonList();
                loadLesson(0);

            } catch (e) {
                console.error(e);
                loaderSpinner.classList.add('hidden');
                loaderError.classList.remove('hidden');
            }
        }

        function handleManualUrl(e) {
            e.preventDefault();
            const inputUrl = document.getElementById('course-url-input').value;
            fetchCourse(inputUrl);
        }

        // --- UI SIDEBAR ---
        function toggleSidebar() {
            if (window.innerWidth >= 1024) {
                // Desktop Mode
                isDesktopSidebarOpen = !isDesktopSidebarOpen;
                if (isDesktopSidebarOpen) {
                    sidebar.classList.remove('lg:w-0');
                    sidebar.classList.add('lg:w-72');
                } else {
                    sidebar.classList.remove('lg:w-72');
                    sidebar.classList.add('lg:w-0');
                }
            } else {
                // Mobile Mode
                if (sidebar.classList.contains('-translate-x-full')) {
                    sidebar.classList.remove('-translate-x-full');
                } else {
                    sidebar.classList.add('-translate-x-full');
                }
            }
        }

        // --- LÓGICA DEL CURSO ---
        function renderLessonList() {
            lessonList.innerHTML = lessons.map((l, idx) => `
                <button onclick="loadLesson(${idx})" 
                    class="w-full text-left px-4 py-3 hover:bg-slate-800 transition-colors flex items-center gap-3 group border-l-2 border-transparent"
                    id="lesson-btn-${idx}">
                    <div class="flex-shrink-0 flex items-center justify-center w-6 h-6 rounded-full bg-slate-800 text-xs font-mono text-slate-400 group-hover:bg-blue-600 group-hover:text-white transition-colors">
                        ${idx + 1}
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="text-sm font-semibold text-slate-300 group-hover:text-white truncate">${l.title}</div>
                    </div>
                    <i data-lucide="lock" class="w-3 h-3 text-slate-600 flex-shrink-0" id="lock-${idx}"></i>
                </button>
            `).join('');
            lucide.createIcons();
        }

        function loadLesson(index) {
            if (!lessons[index]) return;
            currentLessonIndex = index;
            const lesson = lessons[index];
            
            // --- AUTO COLAPSAR SIDEBAR ---
            // Si no es la carga inicial (es decir, el usuario hizo clic), cerramos el sidebar
            if (!isFirstLoad) {
                // Desktop: Si está abierto, ciérralo
                if (window.innerWidth >= 1024 && isDesktopSidebarOpen) {
                    toggleSidebar();
                }
                // Mobile: Si está abierto, ciérralo
                if (window.innerWidth < 1024 && !sidebar.classList.contains('-translate-x-full')) {
                    toggleSidebar();
                }
            }
            isFirstLoad = false;
            // -----------------------------

            document.querySelectorAll('#lesson-list button').forEach(b => {
                b.classList.remove('bg-slate-800', 'border-blue-500');
                b.classList.add('border-transparent');
            });
            const activeBtn = document.getElementById(`lesson-btn-${index}`);
            if(activeBtn) {
                activeBtn.classList.add('bg-slate-800', 'border-blue-500');
            }

            guideContent.innerHTML = lesson.guide;
            const savedCode = localStorage.getItem(`htmlmaster_l${lesson.id}`);
            editor.value = savedCode || lesson.initialCode;
            
            hideFeedback();
            updatePreview();
            validateCode(true);
            
            const btnPrev = document.getElementById('btn-prev');
            if(btnPrev) btnPrev.disabled = index === 0;
            
            const progress = ((index) / (lessons.length - 1)) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;
            document.getElementById('progress-text').innerText = `${Math.round(progress)}%`;
        }

        function updatePreview() {
            const code = editor.value;
            const doc = preview.contentDocument || preview.contentWindow.document;
            doc.open();
            doc.write(code);
            doc.close();
        }

        function validateCode(silent = false) {
            const lesson = lessons[currentLessonIndex];
            const code = editor.value;
            
            if (!lesson.validation) {
                isCodeValid = true;
                updateNextButtonState();
                return;
            }

            const regex = new RegExp(lesson.validation.regex, lesson.validation.flags || 'i');
            isCodeValid = regex.test(code);
            
            updateNextButtonState();

            if (!silent) {
                if (isCodeValid) {
                    showFeedback('success', '¡Excelente!', 'Código correcto. Puedes avanzar.');
                } else {
                    hideFeedback(); 
                }
            }
        }
        
        function checkCode() {
             const lesson = lessons[currentLessonIndex];
             if (!lesson.validation) return;
             if (isCodeValid) {
                 showFeedback('success', '¡Genial!', 'El código cumple los requisitos.');
             } else {
                 showFeedback('error', 'Algo falta...', lesson.validation.error);
             }
        }

        function updateNextButtonState() {
            if (isCodeValid) {
                btnNext.disabled = false;
                btnNext.classList.remove('bg-slate-800', 'text-slate-400');
                btnNext.classList.add('bg-green-600', 'text-white', 'hover:bg-green-700', 'animate-bounce-sm');
                btnNext.innerHTML = `<span>Siguiente</span> <i data-lucide="arrow-right" class="w-3 h-3"></i>`;
                lucide.createIcons();
                const lockIcon = document.getElementById(`lock-${currentLessonIndex}`);
                if (lockIcon) {
                   lockIcon.outerHTML = `<i data-lucide="check" class="w-3 h-3 text-green-500 flex-shrink-0"></i>`;
                   lucide.createIcons(); 
                }
            } else {
                btnNext.disabled = true;
                btnNext.classList.add('bg-slate-800', 'text-slate-400');
                btnNext.classList.remove('bg-green-600', 'text-white', 'hover:bg-green-700', 'animate-bounce-sm');
                btnNext.innerHTML = `<span>Siguiente</span> <i data-lucide="lock" class="w-3 h-3"></i>`;
                lucide.createIcons();
            }
        }

        function checkAndNext() {
            if (isCodeValid) {
                if (currentLessonIndex < lessons.length - 1) {
                    loadLesson(currentLessonIndex + 1);
                } else {
                    alert("¡Curso completado! Felicidades.");
                }
            } else {
                checkCode();
            }
        }

        function prevLesson() {
            if (currentLessonIndex > 0) loadLesson(currentLessonIndex - 1);
        }

        function resetCode() {
            if(confirm('¿Reiniciar código de esta lección?')) {
                const lesson = lessons[currentLessonIndex];
                editor.value = lesson.initialCode;
                updatePreview();
                validateCode();
            }
        }

        function showFeedback(type, title, msg) {
            feedbackArea.classList.remove('translate-y-full');
            const iconContainer = document.getElementById('feedback-icon');
            const titleEl = document.getElementById('feedback-title');
            const msgEl = document.getElementById('feedback-msg');
            
            if (type === 'success') {
                // Colores oscuros para feedback
                feedbackArea.classList.add('border-green-800', 'bg-green-900/50');
                feedbackArea.classList.remove('border-red-800', 'bg-red-900/50');
                iconContainer.className = 'p-2 rounded-full bg-green-900 text-green-400 border border-green-700';
                iconContainer.innerHTML = `<i data-lucide="check" class="w-5 h-5"></i>`;
                titleEl.className = "font-bold text-sm text-green-400";
                msgEl.className = "text-xs mt-1 text-green-300";
            } else {
                feedbackArea.classList.add('border-red-800', 'bg-red-900/50');
                feedbackArea.classList.remove('border-green-800', 'bg-green-900/50');
                iconContainer.className = 'p-2 rounded-full bg-red-900 text-red-400 border border-red-700';
                iconContainer.innerHTML = `<i data-lucide="x" class="w-5 h-5"></i>`;
                titleEl.className = "font-bold text-sm text-red-400";
                msgEl.className = "text-xs mt-1 text-red-300";
            }
            titleEl.textContent = title;
            msgEl.textContent = msg;
            lucide.createIcons();
        }

        function hideFeedback() {
            feedbackArea.classList.add('translate-y-full');
        }

        function switchTab(targetId) {
            document.querySelectorAll('.mobile-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(`panel-${targetId}`).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('text-blue-500', 'active');
                b.classList.add('text-slate-400');
                if(b.dataset.target === targetId) {
                    b.classList.add('text-blue-500', 'active');
                    b.classList.remove('text-slate-400');
                }
            });
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
