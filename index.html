    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; background-color: #020617; } /* Slate 950 base */
        
        /* --- EDITOR ALIGNMENT FIXES (CRITICAL) --- */
        .editor-layer {
            font-family: 'Fira Code', monospace !important;
            font-size: 14px !important;
            line-height: 24px !important;
            letter-spacing: 0px !important;
            tab-size: 2 !important;
            padding: 24px !important;
            margin: 0 !important;
            border: none !important;
            box-sizing: border-box !important;
            white-space: pre !important; /* Evita wrapping diferente */
            overflow-wrap: normal !important;
            overflow: auto !important; /* Scrollbars iguales */
        }

        #highlighting-pre {
            z-index: 0;
            background-color: #0f172a !important; /* Match bg */
            pointer-events: none; /* Clicks go through to textarea */
        }
        
        #highlighting-pre code {
            font-family: inherit !important;
            font-size: inherit !important;
            line-height: inherit !important;
            padding: 0 !important; /* Prism adds padding sometimes, remove it */
            margin: 0 !important;
            white-space: pre !important;
        }

        #code-editor {
            z-index: 1;
            color: transparent !important;
            background: transparent !important;
            caret-color: #fff; /* White cursor */
            resize: none;
        }

        /* Ocultar scrollbar del pre para que no se doble */
        #highlighting-pre::-webkit-scrollbar {
            display: none; 
        }
        
        /* Glassmorphism Utilities */
        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .glass-hover:hover {
            background: rgba(30, 41, 59, 0.7);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }
        
        /* Scrollbars Custom */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        @media (max-width: 1024px) {
            .mobile-panel { display: none; }
            .mobile-panel.active { display: flex; }
        }

        /* Typography improvements */
        .prose-custom h3 { 
            background: linear-gradient(to right, #818cf8, #c084fc); 
            -webkit-background-clip: text; 
            color: transparent; 
            font-size: 1.25rem !important; 
            margin-top: 2em !important; 
            margin-bottom: 0.75em !important; 
            font-weight: 700 !important; 
            letter-spacing: -0.02em;
        }
        .prose-custom p { color: #94a3b8 !important; margin-bottom: 1.25em !important; line-height: 1.7 !important; }
        .prose-custom strong { color: #f1f5f9 !important; font-weight: 600 !important; }
        .prose-custom ul { list-style-type: none !important; padding-left: 0 !important; margin-bottom: 1.5em !important; }
        .prose-custom li { position: relative; padding-left: 1.5em; margin-bottom: 0.5em !important; color: #cbd5e1; }
        .prose-custom li::before { content: "•"; position: absolute; left: 0.25em; color: #6366f1; font-weight: bold; }
        
        .prose-custom pre, .prose-custom code { font-family: 'Fira Code', monospace; }
        
        /* Loading */
        #loading-overlay { display: flex; }
        #loading-overlay.hidden { display: none; }
        
        /* Auth UI */
        .hidden-auth { display: none !important; }

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { getFirestore, doc, setDoc, getDoc, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyDTt30sY8iIZwJU1wAddeWg0k-rhdclgxs",
            authDomain: "learnhtml-85f3c.firebaseapp.com",
            projectId: "learnhtml-85f3c",
            storageBucket: "learnhtml-85f3c.firebasestorage.app",
            messagingSenderId: "244714837282",
            appId: "1:244714837282:web:a55c079436668d4872c17b",
            measurementId: "G-HXQEQFKF4L"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const APP_ID = 'html-master-v1';

        // --- STATE ---
        let lessons = [];
        let currentLessonIndex = 0;
        let isCodeValid = false;
        let currentUser = null;
        let userProgressMap = {};
        let isLoginMode = true;
        let feedbackTimeout; 

        // --- DOM ELEMENTS ---
        const viewHome = document.getElementById('view-home');
        const viewWorkspace = document.getElementById('view-workspace');
        const homeLessonGrid = document.getElementById('home-lesson-grid');
        const editor = document.getElementById('code-editor');
        const highlightingPre = document.getElementById('highlighting-pre');
        const highlightingCode = document.getElementById('highlighting-code');
        const preview = document.getElementById('preview-frame');
        const guideContent = document.getElementById('guide-content');
        const feedbackArea = document.getElementById('feedback-area');
        const btnNext = document.getElementById('btn-next');
        const mobileNav = document.getElementById('mobile-nav');
        const loadingOverlay = document.getElementById('loading-overlay');
        const authModal = document.getElementById('auth-modal');
        const authForm = document.getElementById('auth-form');
        const authError = document.getElementById('auth-error');
        const userInfo = document.getElementById('user-info');
        const loginBtn = document.getElementById('login-btn');

        // --- INIT ---
        async function init() {
            lucide.createIcons();

            // --- CHECK CHEAT FLAG ON LOAD ---
            if (localStorage.getItem('cheat_detected') === 'true') {
                localStorage.removeItem('cheat_detected');
                alert("🚫 ¡ALERTA DE SEGURIDAD!\n\nSe ha detectado un intento de pegar código externo.\nSolo puedes copiar de la guía o de tu propio código.\n\nLa aplicación se ha reiniciado por seguridad.");
            }

            try {
                const response = await fetch('course.json');
                if (!response.ok) throw new Error('Error cargando course.json');
                lessons = await response.json();
            } catch (error) {
                console.error("Fallback JSON error:", error);
                loadingOverlay.innerHTML = `<div class='text-red-400 p-4 font-mono'>Error: ${error.message} <br> <small>Usa Live Server</small></div>`;
                return;
            }

            // --- ANTI-CHEAT SYSTEM ---
            let lastInternalCopy = "";

            // 1. Escuchar copy/cut en el documento para "legitimar" el contenido
            document.addEventListener('copy', (e) => {
                if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') {
                    // Si copian de un input/textarea, cogemos su selección exacta
                    lastInternalCopy = e.target.value.substring(e.target.selectionStart, e.target.selectionEnd);
                } else {
                    // Si copian texto normal (ej: de la guía), cogemos la selección global
                    lastInternalCopy = window.getSelection().toString();
                }
            });
            
            document.addEventListener('cut', (e) => {
                if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') {
                    lastInternalCopy = e.target.value.substring(e.target.selectionStart, e.target.selectionEnd);
                } else {
                    lastInternalCopy = window.getSelection().toString();
                }
            });

            // 2. Interceptar el pegado en el editor
            editor.addEventListener('paste', (e) => {
                // Obtenemos los datos que intentan pegar
                const pastedData = (e.clipboardData || window.clipboardData).getData('text');
                
                // Si lo que pegan NO coincide con lo último que copiaron DENTRO de la app...
                if (pastedData.trim() !== lastInternalCopy.trim()) {
                    e.preventDefault(); // Bloquear el pegado
                    localStorage.setItem('cheat_detected', 'true'); // Guardar flag
                    location.reload(); // Reiniciar la página (castigo)
                }
            });
            // ------------------------

            onAuthStateChanged(auth, async (user) => {
                currentUser = user;
                if (user) {
                    userInfo.classList.remove('hidden');
                    userInfo.classList.add('flex');
                    loginBtn.classList.add('hidden');
                    document.getElementById('user-email').textContent = user.email;
                    document.getElementById('user-avatar').textContent = user.email[0].toUpperCase();
                    await loadUserProgress();
                } else {
                    userInfo.classList.add('hidden');
                    userInfo.classList.remove('flex');
                    loginBtn.classList.remove('hidden');
                    userProgressMap = {};
                }
                renderHome();
                loadingOverlay.classList.add('hidden');
            });
            
            // EDITOR LOGIC: Sync scroll and input
            editor.addEventListener('scroll', () => {
                highlightingPre.scrollTop = editor.scrollTop;
                highlightingPre.scrollLeft = editor.scrollLeft;
            });

            editor.addEventListener('input', () => {
                updateHighlighting(editor.value);
                updatePreview(); // Instant
                validateCode();  // Check validation
            });

            // TAB & ENTER HANDLING
            editor.addEventListener('keydown', (e) => {
                if (e.key === 'Tab') {
                    e.preventDefault();
                    const start = editor.selectionStart;
                    const end = editor.selectionEnd;
                    // Insert 2 spaces
                    editor.value = editor.value.substring(0, start) + "  " + editor.value.substring(end);
                    editor.selectionStart = editor.selectionEnd = start + 2;
                    updateHighlighting(editor.value);
                    updatePreview();
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    const start = editor.selectionStart;
                    const end = editor.selectionEnd;
                    const value = editor.value;
                    
                    // Find current line start
                    const lineStart = value.lastIndexOf('\n', start - 1) + 1;
                    const currentLine = value.substring(lineStart, start);
                    
                    // Calculate indentation
                    const match = currentLine.match(/^\s*/);
                    const indent = match ? match[0] : '';
                    
                    // Insert newline + indentation
                    const insertion = '\n' + indent;
                    editor.value = value.substring(0, start) + insertion + value.substring(end);
                    editor.selectionStart = editor.selectionEnd = start + insertion.length;
                    updateHighlighting(editor.value);
                    updatePreview();
                }
            });
        }

        // --- HIGHLIGHTING LOGIC ---
        function updateHighlighting(text) {
            // Escape HTML entities for safe display in code block
            let html = text.replace(new RegExp("&", "g"), "&amp;")
                           .replace(new RegExp("<", "g"), "&lt;");
            
            // Add a final newline character to ensure the last empty line is rendered if present
            if (text[text.length - 1] === "\n") {
                html += " ";
            }
            
            highlightingCode.innerHTML = html;
            Prism.highlightElement(highlightingCode);
        }

        // --- LOGIC ---
        async function loadUserProgress() {
            if (!currentUser) return;
            try {
                const q = collection(db, 'artifacts', APP_ID, 'users', currentUser.uid, 'progress');
                const querySnapshot = await getDocs(q);
                userProgressMap = {};
                querySnapshot.forEach((doc) => {
                    userProgressMap[doc.id] = doc.data();
                });
            } catch (e) { console.error(e); }
        }

        async function saveProgress() {
            const lesson = lessons[currentLessonIndex];
            if (!currentUser || !lesson) return;
            userProgressMap[lesson.id] = { completed: isCodeValid };
            try {
                const docRef = doc(db, 'artifacts', APP_ID, 'users', currentUser.uid, 'progress', lesson.id);
                await setDoc(docRef, { completed: isCodeValid, updatedAt: new Date().toISOString() }, { merge: true });
            } catch (e) { console.error(e); }
        }

        // --- AUTH ---
        window.toggleAuthModal = (show) => {
            if (show) {
                authModal.classList.remove('hidden');
                setTimeout(() => authModal.children[0].classList.remove('scale-95', 'opacity-0'), 10);
                authError.classList.add('hidden');
                authForm.reset();
            } else {
                authModal.children[0].classList.add('scale-95', 'opacity-0');
                setTimeout(() => authModal.classList.add('hidden'), 200);
            }
        };

        window.toggleAuthMode = () => {
            isLoginMode = !isLoginMode;
            const title = document.getElementById('auth-title');
            const btn = document.getElementById('auth-submit-btn');
            const switchText = document.getElementById('auth-switch-text');
            const switchBtn = document.getElementById('auth-switch-btn');

            if (isLoginMode) {
                title.textContent = "Bienvenido de nuevo";
                btn.innerHTML = `<span>Entrar</span>`;
                switchText.textContent = "¿No tienes cuenta?";
                switchBtn.textContent = "Regístrate gratis";
            } else {
                title.textContent = "Crea tu cuenta";
                btn.innerHTML = `<span>Registrarse</span>`;
                switchText.textContent = "¿Ya tienes cuenta?";
                switchBtn.textContent = "Inicia sesión";
            }
            authError.classList.add('hidden');
        };

        window.handleAuth = async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            authError.classList.add('hidden');

            try {
                if (isLoginMode) await signInWithEmailAndPassword(auth, email, password);
                else await createUserWithEmailAndPassword(auth, email, password);
                window.toggleAuthModal(false);
            } catch (error) {
                authError.classList.remove('hidden');
                let msg = "Error de autenticación";
                if (error.code === 'auth/invalid-credential') msg = "Usuario o contraseña incorrectos.";
                if (error.code === 'auth/email-already-in-use') msg = "Este email ya está en uso.";
                if (error.code === 'auth/weak-password') msg = "La contraseña es muy débil (min 6 caracteres).";
                authError.querySelector('span').textContent = msg;
            }
        };

        window.doLogout = async () => {
            if (confirm("¿Cerrar sesión?")) {
                await signOut(auth);
                window.goHome();
            }
        };

        // --- NAVIGATION ---
        window.goHome = () => {
            viewWorkspace.classList.add('hidden');
            viewHome.classList.remove('hidden');
            mobileNav.classList.add('hidden');
            document.title = "HTML Master: Curso Completo";
            renderHome();
        };

        window.enterWorkspace = (index) => {
            if (!currentUser) { window.toggleAuthModal(true); return; }
            if (index > 0) {
                const prevLesson = lessons[index - 1];
                const prevProgress = userProgressMap[prevLesson.id];
                if (!prevProgress || !prevProgress.completed) {
                    alert("¡Ups! 🔒 Completa la lección anterior para desbloquear esta.");
                    return;
                }
            }
            currentLessonIndex = index;
            viewHome.classList.add('hidden');
            viewWorkspace.classList.remove('hidden');
            if(window.innerWidth < 1024) mobileNav.classList.remove('hidden');
            loadLesson(index);
        };

        function renderHome() {
            const units = {};
            lessons.forEach(l => {
                const unitNum = l.unit || Math.ceil(parseInt(l.id) / 7);
                if (!units[unitNum]) units[unitNum] = [];
                units[unitNum].push(l);
            });

            let htmlContent = '';
            Object.keys(units).forEach(unitNum => {
                const unitLessons = units[unitNum];
                htmlContent += `
                    <div class="animate-fade-in-up" style="animation-delay: ${unitNum * 0.1}s">
                        <div class="flex items-center gap-4 mb-6">
                            <span class="text-xs font-bold text-indigo-400 uppercase tracking-[0.2em] bg-indigo-500/10 px-3 py-1 rounded-full border border-indigo-500/20">Unidad ${unitNum}</span>
                            <div class="h-px bg-gradient-to-r from-indigo-500/20 to-transparent flex-1"></div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                `;

                htmlContent += unitLessons.map(l => {
                    const idx = lessons.indexOf(l);
                    const progress = userProgressMap[l.id];
                    const isDone = progress?.completed;
                    const isChallenge = l.type === 'challenge';
                    
                    let isLocked = false;
                    if (idx > 0) {
                        const prevLesson = lessons[idx - 1];
                        const prevProgress = userProgressMap[prevLesson.id];
                        if (!prevProgress || !prevProgress.completed) isLocked = true;
                    }

                    if (isLocked) {
                        return `
                        <div class="glass p-6 rounded-2xl opacity-40 grayscale select-none cursor-not-allowed relative overflow-hidden group">
                            <div class="flex justify-between items-start mb-4">
                                <span class="text-[10px] font-bold text-slate-500 bg-slate-800/50 px-2 py-1 rounded uppercase tracking-wider">Lección ${idx + 1}</span>
                                <i data-lucide="lock" class="w-5 h-5 text-slate-600"></i>
                            </div>
                            <h3 class="text-lg font-semibold text-slate-400 mb-2">${l.title}</h3>
                            <div class="absolute inset-0 bg-slate-950/20"></div>
                        </div>`;
                    }

                    const borderClass = isChallenge ? 'border-amber-500/30' : 'border-slate-700/50';
                    const hoverClass = isChallenge ? 'hover:border-amber-500/60 hover:shadow-amber-500/10' : 'hover:border-indigo-500/50 hover:shadow-indigo-500/20';
                    const iconColor = isDone ? 'text-emerald-400' : (isChallenge ? 'text-amber-400' : 'text-slate-400');
                    const iconBg = isDone ? 'bg-emerald-500/10' : (isChallenge ? 'bg-amber-500/10' : 'bg-slate-800');
                    const icon = isDone ? 'check' : (isChallenge ? 'trophy' : 'code-2');

                    return `
                    <button onclick="window.enterWorkspace(${idx})" class="glass glass-hover text-left p-6 rounded-2xl transition-all duration-300 group relative overflow-hidden w-full ${borderClass} ${hoverClass}">
                        ${isChallenge ? '<div class="absolute top-0 right-0 p-12 bg-amber-500/5 rounded-full blur-2xl -translate-y-1/2 translate-x-1/2"></div>' : ''}
                        
                        <div class="relative z-10">
                            <div class="flex justify-between items-start mb-4">
                                <span class="text-[10px] font-bold ${isChallenge ? 'text-amber-400 bg-amber-500/10 border-amber-500/20' : 'text-slate-400 bg-slate-800 border-slate-700'} px-2.5 py-1 rounded border uppercase tracking-wider">
                                    ${isChallenge ? 'Reto Final' : `Lección ${idx + 1}`}
                                </span>
                                <div class="w-8 h-8 rounded-lg ${iconBg} flex items-center justify-center ${iconColor} transition-colors">
                                    <i data-lucide="${icon}" class="w-4 h-4"></i>
                                </div>
                            </div>
                            
                            <h3 class="text-lg font-bold text-slate-200 group-hover:text-white transition-colors mb-1 pr-4 leading-tight">${l.title}</h3>
                            
                            ${isDone 
                                ? '<div class="mt-3 flex items-center gap-1.5 text-[10px] font-bold text-emerald-400 uppercase tracking-wider"><div class="w-1.5 h-1.5 rounded-full bg-emerald-400"></div> Completado</div>' 
                                : `<div class="mt-4 h-1 w-full bg-slate-800 rounded-full overflow-hidden"><div class="h-full ${isChallenge ? 'bg-amber-500' : 'bg-indigo-500'} w-0 group-hover:w-full transition-all duration-700 ease-out"></div></div>`
                            }
                        </div>
                    </button>
                    `;
                }).join('') + `</div></div>`;
            });
            homeLessonGrid.innerHTML = htmlContent;
            lucide.createIcons();
        }

        function loadLesson(index) {
            const lesson = lessons[index];
            document.title = `${lesson.title} - HTML Master`;
            guideContent.innerHTML = lesson.guide;
            
            // Set value for both layers
            editor.value = lesson.initialCode;
            updateHighlighting(lesson.initialCode);
            
            hideFeedback();
            preview.srcdoc = ""; 
            setTimeout(() => { updatePreview(); }, 100);
            validateCode(true);
            document.getElementById('btn-prev').disabled = index === 0;
            
            // Animación scroll top
            document.getElementById('panel-guide').querySelector('.custom-scroll').scrollTop = 0;
        }

        function updatePreview() {
            let code = editor.value;
            code = code.replace(/<meta\s+http-equiv=["']refresh["'][^>]*>/gi, '<!-- meta refresh disabled -->');
            const safetyScript = `
                <script>
                    document.addEventListener('DOMContentLoaded', () => {
                        document.body.addEventListener('click', (e) => {
                            const link = e.target.closest('a');
                            if (link && !link.getAttribute('href')?.startsWith('#')) {
                                e.preventDefault();
                                if(link.getAttribute('href') !== 'javascript:void(0)')
                                    if(confirm('¿Abrir enlace externo: ' + link.getAttribute('href') + '?')) window.open(link.getAttribute('href'), '_blank');
                            }
                        });
                        document.body.addEventListener('submit', (e) => { e.preventDefault(); alert('🚀 Formulario enviado (Simulación)'); });
                    });
                <\/script>`;
            preview.srcdoc = code + safetyScript;
        }

        function validateCode(silent = false) {
            const lesson = lessons[currentLessonIndex];
            const code = editor.value;
            if (!lesson.validation) { isCodeValid = true; updateNextButtonState(); return; }
            const regex = new RegExp(lesson.validation.regex, "i");
            isCodeValid = regex.test(code);
            updateNextButtonState();
            if (!silent) {
                if (isCodeValid) { showFeedback('success', '¡Excelente!', 'Has completado la misión.'); saveProgress(); }
                else hideFeedback();
            }
        }

        window.checkCode = () => {
             const lesson = lessons[currentLessonIndex];
             if (isCodeValid) showFeedback('success', '¡Todo correcto!', 'Puedes avanzar.');
             else showFeedback('error', 'Algo falta...', lesson.validation.error);
        }

        function updateNextButtonState() {
            if (isCodeValid) {
                btnNext.disabled = false;
                btnNext.className = "px-4 h-8 flex items-center gap-2 rounded bg-emerald-500 hover:bg-emerald-600 text-white shadow-lg shadow-emerald-900/20 transition-all text-xs font-bold uppercase tracking-wide transform hover:scale-105";
                btnNext.innerHTML = `<span>Siguiente</span> <i data-lucide="arrow-right" class="w-4 h-4"></i>`;
                lucide.createIcons();
            } else {
                btnNext.disabled = true;
                btnNext.className = "px-3 h-8 flex items-center gap-2 rounded bg-slate-800 text-slate-500 cursor-not-allowed transition text-xs font-bold uppercase tracking-wide";
                btnNext.innerHTML = `<span>Sig</span> <i data-lucide="chevron-right" class="w-4 h-4"></i>`;
                lucide.createIcons();
            }
        }

        window.checkAndNext = () => {
            if (isCodeValid) {
                saveProgress();
                if (currentLessonIndex < lessons.length - 1) window.enterWorkspace(currentLessonIndex + 1);
                else { alert("🎉 ¡Felicidades! Has completado todo el curso."); window.goHome(); }
            } else window.checkCode();
        }

        window.prevLesson = () => { if (currentLessonIndex > 0) window.enterWorkspace(currentLessonIndex - 1); }
        window.resetCode = () => {
            if(confirm('¿Reiniciar código?')) {
                editor.value = lessons[currentLessonIndex].initialCode;
                updateHighlighting(editor.value);
                updatePreview(); validateCode(); saveProgress();
            }
        }

        function showFeedback(type, title, msg) {
            clearTimeout(feedbackTimeout);
            feedbackArea.classList.remove('translate-y-4', 'opacity-0', 'pointer-events-none', 'border-transparent');
            const iconContainer = document.getElementById('feedback-icon');
            const titleEl = document.getElementById('feedback-title');
            const msgEl = document.getElementById('feedback-msg');
            
            if (type === 'success') {
                feedbackArea.className = "absolute bottom-6 left-4 right-4 p-4 rounded-xl border transform transition-all duration-500 z-50 shadow-2xl backdrop-blur-xl flex items-start gap-4 bg-emerald-900/80 border-emerald-500/30 text-emerald-50 opacity-100 translate-y-0";
                iconContainer.innerHTML = `<div class="p-1 rounded-full bg-emerald-500/20 text-emerald-400"><i data-lucide="check" class="w-5 h-5"></i></div>`;
                titleEl.className = "font-bold text-sm mb-0.5 text-emerald-300";
                msgEl.className = "text-xs opacity-90 leading-relaxed text-emerald-100/80";
            } else {
                feedbackArea.className = "absolute bottom-6 left-4 right-4 p-4 rounded-xl border transform transition-all duration-500 z-50 shadow-2xl backdrop-blur-xl flex items-start gap-4 bg-red-900/80 border-red-500/30 text-red-50 opacity-100 translate-y-0";
                iconContainer.innerHTML = `<div class="p-1 rounded-full bg-red-500/20 text-red-400"><i data-lucide="x" class="w-5 h-5"></i></div>`;
                titleEl.className = "font-bold text-sm mb-0.5 text-red-300";
                msgEl.className = "text-xs opacity-90 leading-relaxed text-red-100/80";
            }
            titleEl.textContent = title;
            msgEl.textContent = msg;
            lucide.createIcons();
            feedbackTimeout = setTimeout(() => hideFeedback(), 4000);
        }

        function hideFeedback() {
            clearTimeout(feedbackTimeout);
            feedbackArea.className = "absolute bottom-6 left-4 right-4 p-4 rounded-xl border border-transparent transform translate-y-4 opacity-0 transition-all duration-500 z-50 shadow-2xl backdrop-blur-xl flex items-start gap-4 pointer-events-none";
        }

        window.switchTab = (targetId) => {
            document.querySelectorAll('.mobile-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(`panel-${targetId}`).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('text-indigo-400', 'active');
                b.classList.add('text-slate-400');
                if(b.dataset.target === targetId) {
                    b.classList.add('text-indigo-400', 'active');
                    b.classList.remove('text-slate-400');
                }
            });
        };

        init();
    </script>
</body>
</html>
