    <!-- Fuente Nunito (Redondita y amigable) -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fira+Code:wght@500&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #ffffff; color: #4b4b4b; overflow: hidden; }
        
        /* Botones estilo "Chunky" (3D flat) */
        .btn-chunky {
            transition: all 0.1s;
            border-bottom-width: 4px;
        }
        .btn-chunky:active {
            transform: translateY(2px);
            border-bottom-width: 0px;
            margin-top: 4px; /* Compensar movimiento */
        }

        /* Editor Layers Alignment */
        .editor-layer {
            font-family: 'Fira Code', monospace !important;
            font-size: 15px !important;
            line-height: 24px !important;
            letter-spacing: 0px !important;
            tab-size: 2 !important;
            padding: 24px !important;
            margin: 0 !important;
            border: none !important;
            box-sizing: border-box !important;
            white-space: pre !important;
            overflow-wrap: normal !important;
            overflow: auto !important;
        }

        #highlighting-pre {
            z-index: 0;
            background-color: #ffffff !important;
            pointer-events: none;
        }
        
        #highlighting-pre code {
            font-family: inherit !important;
            padding: 0 !important;
            background: transparent !important;
            text-shadow: none !important;
        }

        #code-editor {
            z-index: 1;
            color: transparent !important;
            background: transparent !important;
            caret-color: #000;
            resize: none;
        }

        #highlighting-pre::-webkit-scrollbar { display: none; }
        
        /* Scrollbars Amigables */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: #f0f0f0; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 99px; border: 2px solid #f0f0f0; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

        /* Typography */
        .prose-custom h3 { color: #374151 !important; font-size: 1.2rem !important; margin-top: 1.5em !important; font-weight: 800 !important; }
        .prose-custom p { color: #4b5563 !important; margin-bottom: 1em !important; line-height: 1.6 !important; font-weight: 600; }
        .prose-custom code { background: #f3f4f6; color: #ef4444; padding: 2px 6px; border-radius: 6px; font-family: 'Fira Code'; font-size: 0.9em; border: 1px solid #e5e7eb; }
        .prose-custom pre { background: #1f2937 !important; color: #f3f4f6 !important; border-radius: 12px; padding: 12px; overflow-x: auto; }
        .prose-custom pre code { color: inherit; background: transparent; border: none; }
        
        .hidden-auth { display: none !important; }
    </style>
</head>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { getFirestore, doc, setDoc, getDoc, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyDTt30sY8iIZwJU1wAddeWg0k-rhdclgxs",
            authDomain: "learnhtml-85f3c.firebaseapp.com",
            projectId: "learnhtml-85f3c",
            storageBucket: "learnhtml-85f3c.firebasestorage.app",
            messagingSenderId: "244714837282",
            appId: "1:244714837282:web:a55c079436668d4872c17b",
            measurementId: "G-HXQEQFKF4L"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const APP_ID = 'html-master-v1';

        // --- STATE ---
        let lessons = [];
        let currentLessonIndex = 0;
        let isCodeValid = false;
        let currentUser = null;
        let userProgressMap = {};
        let userStreak = { count: 0, lastActiveDate: null };
        let isLoginMode = true;
        let feedbackTimeout; 

        // --- DOM ELEMENTS ---
        const viewHome = document.getElementById('view-home');
        const viewWorkspace = document.getElementById('view-workspace');
        const homeLessonGrid = document.getElementById('home-lesson-grid');
        const editor = document.getElementById('code-editor');
        const highlightingPre = document.getElementById('highlighting-pre');
        const highlightingCode = document.getElementById('highlighting-code');
        const preview = document.getElementById('preview-frame');
        const guideContent = document.getElementById('guide-content');
        const feedbackArea = document.getElementById('feedback-area');
        const btnNext = document.getElementById('btn-next');
        const mobileNav = document.getElementById('mobile-nav');
        const loadingOverlay = document.getElementById('loading-overlay');
        const authModal = document.getElementById('auth-modal');
        const authForm = document.getElementById('auth-form');
        const authError = document.getElementById('auth-error');
        const userInfo = document.getElementById('user-info');
        const loginBtn = document.getElementById('login-btn');
        const aiModal = document.getElementById('ai-modal');
        const aiContent = document.getElementById('ai-content');
        const streakCountEl = document.getElementById('streak-count');
        const streakIconEl = document.getElementById('streak-icon');
        const progressFill = document.getElementById('progress-fill');

        const getTodayStr = () => new Date().toISOString().split('T')[0];

        // --- INIT ---
        async function init() {
            lucide.createIcons();

            try {
                const response = await fetch('course.json');
                if (!response.ok) throw new Error('Error cargando course.json');
                lessons = await response.json();
            } catch (error) {
                console.error("Fallback JSON error:", error);
                loadingOverlay.innerHTML = `<div class='text-red-400 p-4 font-mono'>Error: ${error.message} <br> <small>Usa Live Server</small></div>`;
                return;
            }

            onAuthStateChanged(auth, async (user) => {
                currentUser = user;
                if (user) {
                    userInfo.classList.remove('hidden');
                    userInfo.classList.add('flex');
                    loginBtn.classList.add('hidden');
                    document.getElementById('user-avatar').textContent = user.email[0].toUpperCase();
                    await Promise.all([loadUserProgress(), initStreak()]);
                } else {
                    userInfo.classList.add('hidden');
                    userInfo.classList.remove('flex');
                    loginBtn.classList.remove('hidden');
                    userProgressMap = {};
                    userStreak = { count: 0, lastActiveDate: null };
                }
                renderHome();
                loadingOverlay.classList.add('hidden');
            });
            
            editor.addEventListener('scroll', () => {
                highlightingPre.scrollTop = editor.scrollTop;
                highlightingPre.scrollLeft = editor.scrollLeft;
            });

            editor.addEventListener('input', () => {
                updateHighlighting(editor.value);
                updatePreview();
                validateCode();
            });

            // Tabs indentation
            editor.addEventListener('keydown', (e) => {
                if (e.key === 'Tab') {
                    e.preventDefault();
                    const start = editor.selectionStart;
                    const end = editor.selectionEnd;
                    editor.value = editor.value.substring(0, start) + "  " + editor.value.substring(end);
                    editor.selectionStart = editor.selectionEnd = start + 2;
                    updateHighlighting(editor.value);
                    updatePreview();
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    const start = editor.selectionStart;
                    const end = editor.selectionEnd;
                    const value = editor.value;
                    const lineStart = value.lastIndexOf('\n', start - 1) + 1;
                    const currentLine = value.substring(lineStart, start);
                    const match = currentLine.match(/^\s*/);
                    const indent = match ? match[0] : '';
                    const insertion = '\n' + indent;
                    editor.value = value.substring(0, start) + insertion + value.substring(end);
                    editor.selectionStart = editor.selectionEnd = start + insertion.length;
                    updateHighlighting(editor.value);
                    updatePreview();
                }
            });
        }

        // --- STREAK LOGIC ---
        async function initStreak() {
            if (!currentUser) return;
            try {
                const docRef = doc(db, 'artifacts', APP_ID, 'users', currentUser.uid, 'account', 'streak');
                const docSnap = await getDoc(docRef);
                const today = getTodayStr();
                
                if (docSnap.exists()) {
                    userStreak = docSnap.data();
                    if (userStreak.lastActiveDate) {
                        const lastDate = new Date(userStreak.lastActiveDate);
                        const currDate = new Date(today);
                        const diffTime = Math.abs(currDate - lastDate);
                        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
                        if (diffDays > 1) userStreak.count = 0; 
                    }
                } else {
                    userStreak = { count: 0, lastActiveDate: null };
                }
                updateStreakUI();
            } catch (e) { console.error(e); }
        }

        async function updateStreak() {
            if (!currentUser) return;
            const today = getTodayStr();
            if (userStreak.lastActiveDate !== today) {
                const lastDate = userStreak.lastActiveDate ? new Date(userStreak.lastActiveDate) : null;
                const currDate = new Date(today);
                
                if (lastDate) {
                    const diffTime = Math.abs(currDate - lastDate);
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
                    if (diffDays === 1) userStreak.count++;
                    else userStreak.count = 1;
                } else userStreak.count = 1;
                
                userStreak.lastActiveDate = today;
                try {
                    const docRef = doc(db, 'artifacts', APP_ID, 'users', currentUser.uid, 'account', 'streak');
                    await setDoc(docRef, userStreak, { merge: true });
                    updateStreakUI(true);
                } catch (e) { console.error(e); }
            }
        }

        function updateStreakUI(animate = false) {
            streakCountEl.textContent = userStreak.count;
            if (userStreak.count > 0) {
                streakIconEl.classList.remove('text-slate-300');
                streakIconEl.classList.add('text-duo-yellow', 'fill-duo-yellow');
                streakCountEl.classList.remove('text-slate-400');
                streakCountEl.classList.add('text-duo-yellow');
            } else {
                streakIconEl.classList.add('text-slate-300');
                streakIconEl.classList.remove('text-duo-yellow', 'fill-duo-yellow');
                streakCountEl.classList.add('text-slate-400');
                streakCountEl.classList.remove('text-duo-yellow');
            }
            if (animate) {
                streakIconEl.classList.add('animate-bounce-fire');
                setTimeout(() => streakIconEl.classList.remove('animate-bounce-fire'), 2000);
            }
        }

        // --- AI ---
        window.askAI = async () => {
            if (!currentUser) { window.toggleAuthModal(true); return; }
            const lesson = lessons[currentLessonIndex];
            aiModal.classList.remove('hidden');
            aiContent.innerHTML = `
                <div class="flex flex-col items-center justify-center py-10 text-slate-400 gap-3">
                    <div class="animate-spin rounded-full h-8 w-8 border-4 border-duo-blue border-t-transparent"></div>
                    <p class="text-sm font-bold">Pensando...</p>
                </div>
            `;

            try {
                const response = await fetch('https://api.mistral.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer mjVkbhVGVY43LJNMttSLDYOFSYFSkOuv' },
                    body: JSON.stringify({
                        model: "mistral-small-latest",
                        messages: [
                            { role: "system", content: "Eres un profesor de HTML amigable y divertido. Responde brevemente y al grano sobre qué le falta al código para pasar la validación. Usa emojis." },
                            { role: "user", content: `Contexto Lección: ${lesson.title}\nValidación Regex: ${lesson.validation.regex}\nRequisito: ${lesson.validation.error}\n\nCódigo Estudiante:\n${editor.value}` }
                        ],
                        temperature: 0.3
                    })
                });
                if (!response.ok) throw new Error('API Error');
                const data = await response.json();
                const aiText = data.choices[0].message.content;
                aiContent.innerHTML = `<div class="markdown-body p-2">${marked.parse(aiText)}</div>`;
            } catch (error) {
                console.error(error);
                aiContent.innerHTML = `<div class="text-center py-8 text-red-400"><p class="font-bold">Error de conexión 😵</p></div>`;
            }
        };

        window.closeAIModal = () => { aiModal.classList.add('hidden'); };

        function updateHighlighting(text) {
            let html = text.replace(new RegExp("&", "g"), "&amp;").replace(new RegExp("<", "g"), "&lt;");
            if (text[text.length - 1] === "\n") html += " ";
            highlightingCode.innerHTML = html;
            Prism.highlightElement(highlightingCode);
        }

        async function loadUserProgress() {
            if (!currentUser) return;
            try {
                const q = collection(db, 'artifacts', APP_ID, 'users', currentUser.uid, 'progress');
                const querySnapshot = await getDocs(q);
                userProgressMap = {};
                querySnapshot.forEach((doc) => { userProgressMap[doc.id] = doc.data(); });
            } catch (e) { console.error(e); }
        }

        async function saveProgress() {
            const lesson = lessons[currentLessonIndex];
            if (!currentUser || !lesson) return;
            updateStreak();
            userProgressMap[lesson.id] = { completed: isCodeValid };
            try {
                const docRef = doc(db, 'artifacts', APP_ID, 'users', currentUser.uid, 'progress', lesson.id);
                await setDoc(docRef, { completed: isCodeValid, updatedAt: new Date().toISOString() }, { merge: true });
            } catch (e) { console.error(e); }
        }

        window.toggleAuthModal = (show) => {
            if (show) { authModal.classList.remove('hidden'); authError.classList.add('hidden'); authForm.reset(); }
            else { authModal.classList.add('hidden'); }
        };

        window.toggleAuthMode = () => {
            isLoginMode = !isLoginMode;
            const title = document.getElementById('auth-title');
            const btn = document.getElementById('auth-submit-btn');
            const switchText = document.getElementById('auth-switch-text');
            const switchBtn = document.getElementById('auth-switch-btn');
            if (isLoginMode) {
                title.textContent = "Bienvenido";
                btn.innerHTML = `<span>ENTRAR</span>`;
                switchText.textContent = "¿Nuevo aquí?";
                switchBtn.textContent = "CREAR CUENTA";
            } else {
                title.textContent = "Crear perfil";
                btn.innerHTML = `<span>REGISTRARSE</span>`;
                switchText.textContent = "¿Ya tienes cuenta?";
                switchBtn.textContent = "INICIA SESIÓN";
            }
            authError.classList.add('hidden');
        };

        window.handleAuth = async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            authError.classList.add('hidden');
            try {
                if (isLoginMode) await signInWithEmailAndPassword(auth, email, password);
                else await createUserWithEmailAndPassword(auth, email, password);
                window.toggleAuthModal(false);
            } catch (error) {
                authError.classList.remove('hidden');
                let msg = "Error desconocido";
                if (error.code === 'auth/invalid-credential') msg = "Datos incorrectos";
                if (error.code === 'auth/email-already-in-use') msg = "Email ya registrado";
                if (error.code === 'auth/weak-password') msg = "Contraseña débil";
                authError.querySelector('span').textContent = msg;
            }
        };

        window.doLogout = async () => { if (confirm("¿Salir?")) { await signOut(auth); window.goHome(); } };
        window.goHome = () => { viewWorkspace.classList.add('hidden'); viewHome.classList.remove('hidden'); mobileNav.classList.add('hidden'); document.title = "HTML Learn"; renderHome(); };

        window.enterWorkspace = (index) => {
            if (!currentUser) { window.toggleAuthModal(true); return; }
            if (index > 0) {
                const prevLesson = lessons[index - 1];
                const prevProgress = userProgressMap[prevLesson.id];
                if (!prevProgress || !prevProgress.completed) { alert("🔒 Completa la lección anterior primero."); return; }
            }
            currentLessonIndex = index;
            viewHome.classList.add('hidden');
            viewWorkspace.classList.remove('hidden');
            if(window.innerWidth < 1024) mobileNav.classList.remove('hidden');
            loadLesson(index);
        };

        function renderHome() {
            const units = {};
            lessons.forEach(l => {
                const unitNum = l.unit || Math.ceil(parseInt(l.id) / 7);
                if (!units[unitNum]) units[unitNum] = [];
                units[unitNum].push(l);
            });

            let activeUnit = 1;
            for(let i = 0; i < lessons.length; i++) {
                if(!userProgressMap[lessons[i].id]?.completed) {
                    activeUnit = lessons[i].unit || Math.ceil(parseInt(lessons[i].id) / 7);
                    break;
                }
            }

            let htmlContent = '';
            Object.keys(units).forEach(unitNum => {
                const unitLessons = units[unitNum];
                const isCurrentUnit = parseInt(unitNum) === activeUnit;
                const isHidden = !isCurrentUnit;
                const rotateClass = isHidden ? '' : 'rotate-180';
                
                // Color de la unidad (alternando)
                const unitColors = ['border-duo-green', 'border-duo-blue', 'border-purple-500', 'border-duo-yellow'];
                const unitColor = unitColors[(unitNum - 1) % unitColors.length];
                const bgColors = ['bg-duo-green', 'bg-duo-blue', 'bg-purple-500', 'bg-duo-yellow'];
                const bgColor = bgColors[(unitNum - 1) % bgColors.length];

                htmlContent += `
                    <div class="mb-4">
                        <div class="rounded-3xl border-2 border-slate-200 overflow-hidden bg-white shadow-[0_4px_0_0_#e5e7eb]">
                            <button onclick="window.toggleUnit('${unitNum}')" class="w-full flex items-center justify-between p-5 bg-white hover:bg-slate-50 transition">
                                <div class="flex flex-col items-start">
                                    <span class="text-xl font-extrabold text-slate-700">Unidad ${unitNum}</span>
                                    <span class="text-slate-400 font-bold text-sm">Conceptos básicos</span>
                                </div>
                                <div class="${bgColor} text-white px-4 py-2 rounded-2xl font-extrabold text-sm shadow-sm flex items-center gap-2">
                                    <i data-lucide="${isHidden ? 'lock' : 'play'}" class="w-4 h-4"></i>
                                    ${isHidden ? 'BLOQUEADO' : 'JUGAR'}
                                </div>
                            </button>
                            
                            <div id="unit-content-${unitNum}" class="p-5 bg-slate-50 border-t-2 border-slate-100 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 ${isHidden ? 'hidden' : ''}">
                `;

                htmlContent += unitLessons.map(l => {
                    const idx = lessons.indexOf(l);
                    const progress = userProgressMap[l.id];
                    const isDone = progress?.completed;
                    const isChallenge = l.type === 'challenge';
                    
                    let isLocked = false;
                    if (idx > 0) {
                        const prevLesson = lessons[idx - 1];
                        const prevProgress = userProgressMap[prevLesson.id];
                        if (!prevProgress || !prevProgress.completed) isLocked = true;
                    }

                    if (isLocked) {
                        return `
                        <div class="p-6 rounded-3xl border-2 border-slate-200 bg-slate-100 opacity-60 cursor-not-allowed flex flex-col items-center justify-center text-center gap-2">
                            <div class="w-16 h-16 rounded-full bg-slate-200 flex items-center justify-center mb-2">
                                <i data-lucide="lock" class="w-8 h-8 text-slate-400"></i>
                            </div>
                            <span class="font-bold text-slate-400 text-sm">Lección ${idx + 1}</span>
                        </div>`;
                    }

                    // Card Styles Playful
                    const activeColor = isChallenge ? 'bg-duo-yellow' : 'bg-duo-green';
                    const activeBorder = isChallenge ? 'border-duo-yellow-shade' : 'border-duo-green-shade';
                    
                    if (isDone) {
                        return `
                        <button onclick="window.enterWorkspace(${idx})" class="group relative p-6 rounded-3xl bg-duo-yellow border-b-4 border-duo-yellow-shade hover:bg-duo-yellow-hover active:border-b-0 active:mt-1 transition-all flex flex-col items-center text-center">
                            <div class="absolute top-3 right-3 bg-white/30 rounded-full p-1"><i data-lucide="check" class="w-4 h-4 text-white"></i></div>
                            <div class="w-16 h-16 rounded-full bg-white/20 flex items-center justify-center mb-3 text-white">
                                <i data-lucide="${isChallenge ? 'trophy' : 'star'}" class="w-8 h-8"></i>
                            </div>
                            <h3 class="font-extrabold text-white text-lg leading-tight mb-1">${l.title}</h3>
                        </button>
                        `;
                    }

                    // Current / Available
                    return `
                    <button onclick="window.enterWorkspace(${idx})" class="group p-6 rounded-3xl bg-white border-2 border-slate-200 border-b-4 hover:bg-slate-50 active:border-b-2 active:mt-0.5 transition-all flex flex-col items-center text-center">
                        <div class="w-16 h-16 rounded-full ${isChallenge ? 'bg-duo-yellow text-white' : 'bg-duo-green text-white'} flex items-center justify-center mb-3 shadow-sm group-hover:scale-110 transition-transform">
                            <i data-lucide="${isChallenge ? 'crown' : 'play'}" class="w-8 h-8 ml-1"></i>
                        </div>
                        <h3 class="font-extrabold text-slate-700 text-lg leading-tight mb-1">${l.title}</h3>
                        <span class="text-xs font-bold text-slate-400 uppercase tracking-wide">Empezar</span>
                    </button>
                    `;
                }).join('') + `</div></div></div>`;
            });
            homeLessonGrid.innerHTML = htmlContent;
            lucide.createIcons();
        }

        window.toggleUnit = (unitNum) => {
            const content = document.getElementById(`unit-content-${unitNum}`);
            if (content.classList.contains('hidden')) content.classList.remove('hidden');
            else content.classList.add('hidden');
        };

        function loadLesson(index) {
            const lesson = lessons[index];
            document.title = `${lesson.title} - HTML Learn`;
            guideContent.innerHTML = lesson.guide;
            editor.value = lesson.initialCode;
            updateHighlighting(lesson.initialCode);
            
            // Progress Update
            const total = lessons.length;
            const progress = ((index + 1) / total) * 100;
            progressFill.style.width = `${progress}%`;

            hideFeedback();
            preview.srcdoc = ""; 
            setTimeout(() => { updatePreview(); }, 100);
            validateCode(true);
            
            // Reset state buttons
            btnNext.classList.add('hidden');
            
            document.getElementById('panel-guide').querySelector('.custom-scroll').scrollTop = 0;
        }

        function updatePreview() {
            let code = editor.value;
            code = code.replace(/<meta\s+http-equiv=["']refresh["'][^>]*>/gi, '');
            const safetyScript = `
                <script>
                    document.addEventListener('DOMContentLoaded', () => {
                        document.body.addEventListener('click', (e) => {
                            const link = e.target.closest('a');
                            if (link && !link.getAttribute('href')?.startsWith('#')) {
                                e.preventDefault();
                                if(link.getAttribute('href') !== 'javascript:void(0)')
                                    if(confirm('¿Abrir enlace externo?')) window.open(link.getAttribute('href'), '_blank');
                            }
                        });
                        document.body.addEventListener('submit', (e) => { e.preventDefault(); alert('🚀 ¡Formulario enviado!'); });
                    });
                <\/script>`;
            
            if (code.match(/<!DOCTYPE\s+html>/i)) {
                preview.srcdoc = code.replace(/(<!DOCTYPE\s+html>)/i, '$1' + safetyScript);
            } else {
                preview.srcdoc = safetyScript + code;
            }
        }

        function validateCode(silent = false) {
            const lesson = lessons[currentLessonIndex];
            const code = editor.value;
            if (!lesson.validation) { isCodeValid = true; updateNextButtonState(); return; }
            const regex = new RegExp(lesson.validation.regex, "i");
            isCodeValid = regex.test(code);
            updateNextButtonState();
            if (!silent && isCodeValid) {
                showFeedback('success', '¡Excelente!', '¡Lo has conseguido!');
                saveProgress();
                triggerConfetti();
            } else if (!silent) {
                hideFeedback();
            }
        }

        window.checkCode = () => {
             const lesson = lessons[currentLessonIndex];
             if (isCodeValid) {
                 showFeedback('success', '¡Correcto!', 'Buen trabajo. Sigue así.');
                 saveProgress();
                 triggerConfetti();
             } else {
                 showFeedback('error', 'Casi...', lesson.validation.error);
             }
        }

        function updateNextButtonState() {
            if (isCodeValid) {
                btnNext.classList.remove('hidden');
            } else {
                btnNext.classList.add('hidden');
            }
        }

        window.checkAndNext = () => {
            if (isCodeValid) {
                saveProgress();
                if (currentLessonIndex < lessons.length - 1) window.enterWorkspace(currentLessonIndex + 1);
                else { alert("🎉 ¡Curso completado! Eres un maestro del HTML."); window.goHome(); }
            } else window.checkCode();
        }

        window.prevLesson = () => { if (currentLessonIndex > 0) window.enterWorkspace(currentLessonIndex - 1); }
        window.resetCode = () => {
            if(confirm('¿Reiniciar código?')) {
                editor.value = lessons[currentLessonIndex].initialCode;
                updateHighlighting(editor.value);
                updatePreview(); validateCode(); saveProgress();
            }
        }

        function showFeedback(type, title, msg) {
            clearTimeout(feedbackTimeout);
            feedbackArea.classList.remove('translate-y-4', 'opacity-0', 'pointer-events-none', 'border-red-200', 'bg-red-50', 'border-duo-green', 'bg-green-50');
            const iconContainer = document.getElementById('feedback-icon');
            const titleEl = document.getElementById('feedback-title');
            const msgEl = document.getElementById('feedback-msg');
            
            if (type === 'success') {
                feedbackArea.classList.add('border-duo-green', 'bg-[#d7ffb8]', 'text-slate-800');
                iconContainer.innerHTML = `<i data-lucide="check" class="w-6 h-6 text-duo-green"></i>`;
                titleEl.className = "font-extrabold text-lg text-duo-green-shade";
                titleEl.textContent = "¡GENIAL!";
            } else {
                feedbackArea.classList.add('border-red-200', 'bg-red-50', 'text-slate-800');
                iconContainer.innerHTML = `<i data-lucide="x" class="w-6 h-6 text-red-500"></i>`;
                titleEl.className = "font-extrabold text-lg text-red-500";
                titleEl.textContent = "HAY UN ERROR";
            }
            msgEl.textContent = msg;
            lucide.createIcons();
            
            // Auto hide after 5 seconds if not success (success stays until next)
            if(type !== 'success') feedbackTimeout = setTimeout(() => hideFeedback(), 5000);
        }

        function hideFeedback() {
            clearTimeout(feedbackTimeout);
            feedbackArea.classList.add('translate-y-4', 'opacity-0', 'pointer-events-none');
        }

        function triggerConfetti() {
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, zIndex: 100, colors: ['#58cc02', '#1cb0f6', '#ffc800'] });
        }

        window.switchTab = (targetId) => {
            document.querySelectorAll('.mobile-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(`panel-${targetId}`).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('text-duo-blue', 'active');
                b.classList.add('text-slate-400');
                if(b.dataset.target === targetId) {
                    b.classList.add('text-duo-blue', 'active');
                    b.classList.remove('text-slate-400');
                }
            });
        };

        init();
    </script>
</body>
</html>
